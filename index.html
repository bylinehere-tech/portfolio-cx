<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>문수진 · 고객 경험 중심 통합 마케터</title>
<meta name="description" content="시설의 강점을 고객이 다시 찾고 싶은 경험으로 바꾸는 통합 마케터, 문수진의 CX 포트폴리오." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{
    --paper:#F7F2E7; --paper-2:#FFFDF7;
    --navy:#1E2B54; --navy-2:#16203F;
    --ink:#24262E; --body:#3A3C44; --muted:#7A7367;
    --amber:#E7A02E; --amber-deep:#C97F16;
    --pine:#2F6A52; --pine-deep:#245640;
    --line:#E5DCC8; --line-ink:rgba(30,43,84,.14);
    --amber-tint:#FBEBCB; --pine-tint:#E1EDE5; --navy-tint:#E3E7F1;
    --serif:"Noto Serif KR",serif;
    --sans:"Pretendard","Noto Serif KR",sans-serif;
    --mono:"DM Mono","Pretendard",monospace;
    --wrap:1020px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--paper);color:var(--body);font-family:var(--sans);font-size:16px;line-height:1.72;-webkit-font-smoothing:antialiased}
  ::selection{background:var(--amber-tint)}
  .wrap{max-width:var(--wrap);margin:0 auto;padding:0 30px}

  .eyebrow{font-family:var(--mono);font-size:.72rem;letter-spacing:.16em;text-transform:uppercase;display:inline-flex;align-items:center;gap:9px;color:var(--pine-deep)}
  .eyebrow::before{content:"";width:22px;height:2px;background:var(--amber);display:inline-block}
  .eyebrow .en{color:var(--muted)}
  .ic{width:1em;height:1em;display:inline-block;vertical-align:-.125em;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}

  header.bar{position:sticky;top:0;z-index:30;background:rgba(247,242,231,.9);backdrop-filter:saturate(130%) blur(9px);border-bottom:1px solid var(--line-ink)}
  .bar .wrap{display:flex;align-items:center;justify-content:space-between;height:58px}
  .bar .sig{font-family:var(--serif);font-weight:700;color:var(--navy);font-size:1.06rem}
  .bar .sig b{color:var(--amber-deep)}
  .bar nav{display:flex;gap:22px}
  .bar nav a{font-family:var(--mono);font-size:.68rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s}
  .bar nav a:hover,.bar nav a:focus-visible{color:var(--navy)}
  @media(max-width:680px){.bar nav{display:none}}

  /* hero */
  .hero{position:relative;overflow:hidden;padding:78px 0 58px}
  .hero .art{position:absolute;top:-40px;right:-90px;width:540px;height:540px;pointer-events:none;opacity:.9}
  .hero .art svg{width:100%;height:100%}
  .hero .inner{position:relative;z-index:2;max-width:660px}
  .hero .role{font-family:var(--mono);font-size:.75rem;letter-spacing:.16em;text-transform:uppercase;color:var(--pine-deep);margin-bottom:22px;display:flex;align-items:center;gap:9px}
  .hero .role .ic{color:var(--amber-deep);font-size:1.05rem}
  .hero h1{font-family:var(--serif);font-weight:900;color:var(--navy);font-size:clamp(2.8rem,7.6vw,4.4rem);line-height:1.05;letter-spacing:-.02em}
  .hero h1 .latin{display:block;font-family:var(--mono);font-weight:400;font-size:.2em;letter-spacing:.28em;color:var(--muted);margin-top:18px}
  .hero .tagline{font-family:var(--serif);font-weight:500;font-size:clamp(1.2rem,2.6vw,1.5rem);color:var(--ink);line-height:1.55;max-width:24ch;margin-top:28px}
  .hero .tagline b{color:var(--amber-deep);font-weight:700}
  .hero .slogan{margin-top:18px;color:var(--muted);font-size:.97rem;max-width:42ch}
  .flow{display:flex;align-items:center;gap:10px;margin-top:46px;position:relative;z-index:2;background:var(--paper-2);border:1px solid var(--line);border-radius:16px;padding:20px 26px}
  .fnode{flex:1;display:flex;align-items:center;gap:13px;min-width:0}
  .fnode .fic{width:46px;height:46px;flex:none;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.35rem}
  .fnode .ft{font-family:var(--serif);font-size:1.24rem;color:var(--navy);font-weight:700;line-height:1.15}
  .fnode .ft small{display:block;font-family:var(--mono);font-size:.55rem;letter-spacing:.16em;color:var(--muted);font-weight:400;margin-bottom:3px;text-transform:uppercase}
  .fnode .fd{font-size:.77rem;color:var(--muted);line-height:1.4;margin-top:3px}
  .fnode:nth-of-type(1) .fic{background:var(--navy-tint);color:var(--navy)}
  .fnode:nth-of-type(3) .fic{background:var(--amber-tint);color:var(--amber-deep)}
  .fnode:nth-of-type(5) .fic{background:var(--pine-tint);color:var(--pine-deep)}
  .farrow{display:flex;align-items:center;color:var(--amber-deep);font-size:1.35rem;flex:none;font-family:var(--mono)}
  @media(max-width:760px){
    .flow{flex-direction:column;align-items:flex-start;gap:6px;padding:20px 22px}
    .farrow{transform:rotate(90deg);margin-left:15px}
  }

  section.block{padding:74px 0}
  .section-head h2{font-family:var(--serif);color:var(--navy);font-weight:700;font-size:clamp(1.7rem,3.6vw,2.3rem);line-height:1.18;letter-spacing:-.01em;margin-top:16px}
  .section-head p.lead{color:var(--body);margin-top:13px;max-width:56ch}

  /* approach trail */
  .trail{margin-top:44px;position:relative;padding-left:6px}
  .trail::before{content:"";position:absolute;left:26px;top:14px;bottom:14px;width:2px;background:repeating-linear-gradient(var(--pine) 0 7px,transparent 7px 14px);transform-origin:top;transform:scaleY(var(--trail,1));transition:transform 1.1s ease}
  .step{position:relative;display:grid;grid-template-columns:54px 1fr;gap:24px;padding:14px 0}
  .step .badge{width:54px;height:54px;border-radius:50%;background:var(--paper-2);border:2px solid var(--pine);color:var(--pine-deep);display:flex;align-items:center;justify-content:center;font-size:1.3rem;position:relative;z-index:2;box-shadow:0 0 0 6px var(--paper)}
  .step:nth-child(2) .badge{border-color:var(--amber);color:var(--amber-deep)}
  .step:nth-child(3) .badge{border-color:var(--navy);color:var(--navy)}
  .step .num{font-family:var(--mono);font-size:.64rem;letter-spacing:.14em;color:var(--muted);text-transform:uppercase}
  .step .st{font-family:var(--serif);font-size:1.28rem;color:var(--navy);font-weight:700;margin:2px 0 5px}
  .step .sd{color:var(--body);font-size:.95rem;max-width:58ch}
  @media(max-width:640px){.step{grid-template-columns:46px 1fr;gap:17px}.step .badge{width:46px;height:46px;font-size:1.1rem}.trail::before{left:22px}}

  /* chapters */
  .chapter{margin-top:60px}
  .chapter-head{display:flex;align-items:baseline;gap:16px;flex-wrap:wrap;border-bottom:2px solid var(--navy);padding-bottom:12px}
  .chapter-head .cno{font-family:var(--mono);font-size:.8rem;letter-spacing:.14em;color:var(--amber-deep);text-transform:uppercase}
  .chapter-head h3{font-family:var(--serif);color:var(--navy);font-weight:700;font-size:clamp(1.3rem,2.8vw,1.7rem)}
  .chapter-head .cdesc{font-size:.85rem;color:var(--muted);margin-left:auto}
  @media(max-width:640px){.chapter-head .cdesc{margin-left:0;width:100%}}

  /* case card */
  .case{border:1px solid var(--line);border-radius:18px;overflow:hidden;background:var(--paper-2);margin-top:24px}
  .case.tone-amber{border-top:3px solid var(--amber)}
  .case.tone-pine{border-top:3px solid var(--pine)}
  .case.tone-navy{border-top:3px solid var(--navy)}
  /* image slot */
  .cimg{position:relative;aspect-ratio:21/8;background:var(--navy-tint);overflow:hidden}
  .cimg img{width:100%;height:100%;object-fit:cover;display:block}
  .cimg.noimg img{display:none}
  .cimg .fallback{display:none;position:absolute;inset:0;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--navy);opacity:.55}
  .cimg.noimg .fallback{display:flex}
  .cimg .fallback .ic{font-size:2.6rem;stroke-width:1.3}
  .cimg .fallback span{font-family:var(--mono);font-size:.62rem;letter-spacing:.2em;text-transform:uppercase}
  .cimg.noimg{background:
    repeating-linear-gradient(-45deg, rgba(30,43,84,.05) 0 14px, transparent 14px 28px), var(--paper)}
  .tone-amber .cimg.noimg{background:repeating-linear-gradient(-45deg, rgba(201,127,22,.07) 0 14px, transparent 14px 28px), var(--amber-tint)}
  .tone-pine .cimg.noimg{background:repeating-linear-gradient(-45deg, rgba(36,86,64,.07) 0 14px, transparent 14px 28px), var(--pine-tint)}
  .tone-amber .cimg .fallback{color:var(--amber-deep)}
  .tone-pine .cimg .fallback{color:var(--pine-deep)}
  .cbody{padding:26px 28px 30px}
  .case .ck{font-family:var(--mono);font-size:.72rem;letter-spacing:.14em;text-transform:uppercase;display:flex;align-items:center;gap:9px;margin-bottom:10px}
  .tone-amber .ck{color:var(--amber-deep)} .tone-pine .ck{color:var(--pine-deep)} .tone-navy .ck{color:var(--navy)}
  .case h4{font-family:var(--serif);color:var(--navy);font-weight:700;font-size:clamp(1.35rem,2.8vw,1.75rem);line-height:1.25;letter-spacing:-.01em}
  .case .corg{font-family:var(--mono);font-size:.68rem;letter-spacing:.06em;color:var(--muted);text-transform:uppercase;margin:8px 0 20px}
  .beats{display:grid;gap:0;border-top:1px solid var(--line)}
  .beat{display:grid;grid-template-columns:110px 1fr;gap:20px;padding:13px 0;border-bottom:1px solid var(--line)}
  .beat .bl{font-family:var(--mono);font-size:.74rem;letter-spacing:.08em;color:var(--navy);text-transform:uppercase;padding-top:2px}
  .beat .bt{color:var(--body);font-size:.95rem;line-height:1.68}
  .beat.scale .bt{font-family:var(--mono);font-size:.84rem;color:var(--pine-deep)}
  @media(max-width:640px){.beat{grid-template-columns:1fr;gap:4px}}
  .medals{display:flex;flex-wrap:wrap;gap:16px;margin-top:24px}
  .medal{text-align:center;flex:0 1 140px;min-width:120px}
  .medal .disc{width:100px;height:100px;margin:0 auto;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;border:3px solid}
  .medal .disc .n{font-family:var(--mono);font-weight:500;font-size:1.42rem;line-height:1;letter-spacing:-.02em}
  .medal .disc .grow{font-size:.68rem;margin-top:3px;letter-spacing:.1em}
  .medal .lab{font-size:.76rem;color:var(--body);margin-top:10px;line-height:1.42;max-width:16ch;margin-left:auto;margin-right:auto}
  .medal.t-amber .disc{border-color:var(--amber);background:var(--amber-tint)}
  .medal.t-amber .disc .n,.medal.t-amber .disc .grow{color:var(--amber-deep)}
  .medal.t-pine .disc{border-color:var(--pine);background:var(--pine-tint)}
  .medal.t-pine .disc .n{color:var(--pine-deep)}
  .medal.t-navy .disc{border-color:var(--navy);background:var(--navy-tint)}
  .medal.t-navy .disc .n{color:var(--navy)}

  /* also strip */
  .summaries{margin-top:26px;display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .sumcard{border:1px solid var(--line);border-radius:16px;background:var(--paper-2);padding:22px;display:flex;flex-direction:column;transition:transform .25s,box-shadow .25s}
  .sumcard:hover{transform:translateY(-4px);box-shadow:0 16px 34px -20px rgba(30,43,84,.4)}
  .sumcard .sicon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;margin-bottom:14px}
  .sumcard.tone-amber .sicon{background:var(--amber-tint);color:var(--amber-deep)}
  .sumcard.tone-navy .sicon{background:var(--navy-tint);color:var(--navy)}
  .sumcard .smeta{font-family:var(--mono);font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .sumcard h4{font-family:var(--serif);color:var(--navy);font-weight:700;font-size:1.16rem;line-height:1.3;margin-bottom:10px}
  .sumcard p{color:var(--body);font-size:.89rem;line-height:1.62}
  .sumcard .tags{margin-top:13px;display:flex;flex-wrap:wrap;gap:7px}
  .sumcard .tags span{font-family:var(--mono);font-size:.6rem;letter-spacing:.04em;color:var(--pine-deep);background:var(--pine-tint);border-radius:999px;padding:4px 10px}
  @media(max-width:680px){.summaries{grid-template-columns:1fr}}

  /* team */
  section.team{background:var(--pine-tint)}
  .pipeline{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-top:32px}
  .pnode{background:var(--paper-2);border:1.5px solid var(--pine);color:var(--pine-deep);border-radius:12px;padding:11px 19px;font-family:var(--mono);font-size:.8rem;letter-spacing:.05em;text-transform:uppercase}
  .parrow{color:var(--pine);font-size:1.2rem}
  .lead-body p{color:var(--body);max-width:62ch;margin-top:20px}
  .lead-stat{margin-top:30px;display:flex;flex-wrap:wrap;gap:18px}

  /* editorial */
  .edit-card{margin-top:38px;border:1px solid var(--line);border-radius:18px;background:var(--paper-2);padding:30px 30px 32px}
  .edit-card p{color:var(--body);max-width:64ch}
  .cities{margin-top:22px;display:flex;flex-wrap:wrap;gap:9px}
  .cities span{font-family:var(--mono);font-size:.68rem;letter-spacing:.06em;color:var(--navy);background:var(--navy-tint);border-radius:999px;padding:6px 13px}
  .edit-links{margin-top:24px;display:flex;flex-wrap:wrap;gap:14px}
  .edit-links a{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:.74rem;letter-spacing:.05em;text-transform:uppercase;color:var(--paper-2);background:var(--navy);border-radius:999px;padding:11px 20px;text-decoration:none;transition:background .2s}
  .edit-links a:hover,.edit-links a:focus-visible{background:var(--navy-2)}

  /* skills */
  .skills-grid{margin-top:38px;display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .skill{display:flex;gap:15px;align-items:flex-start;background:var(--paper-2);border:1px solid var(--line);border-radius:14px;padding:17px 19px}
  .skill .sk-ic{width:36px;height:36px;flex:none;border-radius:10px;background:var(--navy-tint);color:var(--navy);display:flex;align-items:center;justify-content:center;font-size:1.1rem}
  .skill .sk-k{font-family:var(--mono);font-size:.7rem;letter-spacing:.08em;color:var(--navy);text-transform:uppercase;margin-bottom:4px}
  .skill .sk-v{color:var(--body);font-size:.88rem;line-height:1.55}
  @media(max-width:640px){.skills-grid{grid-template-columns:1fr}}

  /* contact */
  section.contact{background:var(--navy);color:#EDE9DE;padding:84px 0 88px;position:relative;overflow:hidden}
  section.contact .glow{position:absolute;right:-120px;bottom:-140px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(231,160,46,.28),transparent 66%);pointer-events:none}
  section.contact .eyebrow{color:var(--amber)}
  section.contact .eyebrow::before{background:var(--amber)}
  section.contact h2{font-family:var(--serif);color:#FCFAF3;font-weight:700;font-size:clamp(2rem,4.4vw,2.8rem);line-height:1.16;margin:15px 0 28px;position:relative;z-index:2}
  .big-email{display:block;width:fit-content;margin-top:26px;font-family:var(--serif);font-weight:700;color:var(--amber);text-decoration:none;font-size:clamp(1.45rem,4.2vw,2.3rem);line-height:1.2;border-bottom:2px solid rgba(231,160,46,.4);padding-bottom:6px;transition:border-color .2s;word-break:break-all;position:relative;z-index:2}
  .big-email:hover,.big-email:focus-visible{border-color:var(--amber)}
  .clist{margin-top:32px;display:flex;flex-wrap:wrap;gap:14px 40px;position:relative;z-index:2}
  .crow{display:flex;flex-direction:column;gap:3px}
  .crow .cl{font-family:var(--mono);font-size:.64rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(237,233,222,.55)}
  .crow .cv a{color:#EDE9DE;text-decoration:none;font-size:1rem;border-bottom:1px solid rgba(237,233,222,.3);padding-bottom:2px;transition:border-color .2s;word-break:break-all}
  .crow .cv a:hover,.crow .cv a:focus-visible{border-color:#EDE9DE}

  footer{background:var(--navy-2);color:rgba(237,233,222,.6);padding:22px 0}
  footer .wrap{display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
  footer span{font-family:var(--mono);font-size:.64rem;letter-spacing:.1em;text-transform:uppercase}

  .reveal{opacity:0;transform:translateY(18px);transition:opacity .7s ease,transform .7s ease}
  .reveal.in{opacity:1;transform:none}
  a:focus-visible{outline:2px solid var(--amber);outline-offset:3px;border-radius:2px}
  @media(prefers-reduced-motion:reduce){html{scroll-behavior:auto}.reveal{opacity:1;transform:none;transition:none}.trail::before{transition:none}}
</style>
</head>
<body>

    <symbol id="ic-run" viewBox="0 0 24 24"><circle cx="15.5" cy="4.5" r="1.8"/><path d="M14 8l-4 2 1.5 3.5L9 20"/><path d="M11.5 13.5L15 15l2 4"/><path d="M14 8l3 1 2.5-1.5"/><path d="M11 10l-3 .5-1.5 2.5"/></symbol>

    <symbol id="ic-spark" viewBox="0 0 24 24"><path d="M12 3l1.8 5.2L19 10l-5.2 1.8L12 17l-1.8-5.2L5 10l5.2-1.8z"/><path d="M18.5 15.5l.7 2 2 .7-2 .7-.7 2-.7-2-2-.7 2-.7z"/></symbol>

    <symbol id="ic-chart" viewBox="0 0 24 24"><path d="M4 20V10M10 20V4M16 20v-8M22 20H2"/></symbol>
    <symbol id="ic-image" viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10" r="1.6"/><path d="M4 17l5-5 4 4 3-2 4 3"/></symbol>
    <symbol id="ic-paw" viewBox="0 0 24 24"><circle cx="7" cy="8" r="1.9"/><circle cx="12" cy="6" r="1.9"/><circle cx="17" cy="8" r="1.9"/><path d="M12 11c-3 0-5.5 2.4-5.5 4.8 0 1.6 1.2 2.7 2.8 2.7 1 0 1.8-.4 2.7-.4s1.7.4 2.7.4c1.6 0 2.8-1.1 2.8-2.7C17.5 13.4 15 11 12 11z"/></symbol>
    <symbol id="ic-room" viewBox="0 0 24 24"><path d="M3 20V9l9-5 9 5v11"/><path d="M3 20h18"/><path d="M9 20v-6h6v6"/></symbol>
    <symbol id="ic-flag" viewBox="0 0 24 24"><path d="M5 21V4"/><path d="M5 4h12l-2.5 4L17 12H5"/></symbol>
    <symbol id="ic-music" viewBox="0 0 24 24"><path d="M9 18V6l10-2v12"/><circle cx="6.8" cy="18" r="2.4"/><circle cx="16.8" cy="16" r="2.4"/></symbol>
  </svg>

  <header class="bar">

      const trail=document.querySelector(".trail");
      if(trail){
        trail.style.setProperty("--trail","0");
        const t=new IntersectionObserver((ens)=>{ens.forEach(en=>{if(en.isIntersecting){en.target.style.setProperty("--trail","1");t.unobserve(en.target);}});},{threshold:.2});
        t.observe(trail);
      }
    }else{
      els.forEach(e=>e.classList.add("in"));
    }
  })();
})();
</script>
</body>
</html>
